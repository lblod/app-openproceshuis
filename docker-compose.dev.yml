services:
  identifier:
    ports:
      - "80:80"
  virtuoso:
    ports:
      - "8890:8890"
  mock-login:
    image: lblod/mock-login-service:0.7.0
    links:
      - database:database
    restart: "no"
  op-public-consumer:
    environment:
      DCR_SYNC_BASE_URL: "https://organisaties.abb.lblod.info"
    restart: "no"
  frontend:
    image: lblod/frontend-openproceshuis:latest
  bpmn:
    image: lblod/openproceshuis-bpmn-service:latest
  visio:
    image: lblod/openproceshuis-visio-service:latest
  process:
    image: lblod/openproceshuis-process-service:latest
    restart: "no"
  sparql-endpoint-proxy:
    restart: "no"
    environment:
      LOGLEVEL: 'error'
      PROXY_LOGLEVEL: 'debug'
  swagger:
    restart: "no"
  modified:
    restart: "no"
  ldes-serve-feed:
    restart: "no"
    environment:
      BASE_URL: "http://localhost/streams/ldes/"
  ldes-delta-pusher:
    restart: "no"
    environment:
      LDES_STREAM_PREFIX: "http://localhost/streams/ldes/"
      LDES_BASE: "http://localhost/streams/ldes/"
  ################################################################################
  # Integration services
  ################################################################################ 
  m2m:
    image: lblod/m2m-login-service:latest
    restart: "no"
    environment:
      MU_APPLICATION_AUTH_DISCOVERY_URL: "https://authenticatie-ti.vlaanderen.be/.well-known/oauth-authorization-server/op"
  vendor-api:
    image: lblod/vendor-api-openproceshuis-service:latest
    restart: no
    environment:
      LOG_LEVEL: 'debug'
  error-alert:
    environment:
      EMAIL_FROM: "test@example.com"
      EMAIL_TO: "123@example.com"
    restart: "no"

  deliver-email:
    environment:
      NODE_ENV: "development"
      WELL_KNOWN_SERVICE: "test"
      EMAIL_CRON_PATTERN: "* * * * *" # Every minute
    restart: "no"
  shared-processes-consumer:
    restart: no
    environment:
      BATCH_SIZE: 100
      CRON_PATTERN: "*/32 * * * * *" # Every 32 seconds
      LOG_LEVEL: debug
