version: "3.4"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    image: lblod/frontend-openproceshuis:latest # FIXME latest in docker compose dev, released here
    volumes:
      - ./config/frontend/add-x-frame-options-header.conf:/config/add-x-frame-options.conf
    labels:
      - "logging=true"
    logging: *default-logging
    restart: always
  identifier:
    image: semtech/mu-identifier:1.10.1
    labels:
      - "logging=true"
    logging: *default-logging
    environment:
      SESSION_COOKIE_SECURE: "on"
      DEFAULT_MU_AUTH_ALLOWED_GROUPS_HEADER: '[{"variables":[],"name":"public"},{"variables":[],"name":"clean"}]'
    links:
      - dispatcher:dispatcher
    restart: always
  dispatcher:
    image: semtech/mu-dispatcher:2.1.0-beta.2
    logging: *default-logging
    labels:
      - "logging=true"
    links:
      - resource:resource
    volumes:
      - ./config/dispatcher:/config
    restart: always
  database:
    logging: *default-logging
    labels:
      - "logging=true"
    image: semtech/mu-authorization:0.6.0-beta.5
    environment:
      MU_SPARQL_ENDPOINT: "http://triplestore:8890/sparql"
    volumes:
      - ./config/authorization:/config
    restart: always
  triplestore:
    logging: *default-logging
    labels:
      - "logging=true"
    image: redpencil/virtuoso:1.2.0-rc.1
    environment:
      SPARQL_UPDATE: "true"
      DEFAULT_GRAPH: "http://mu.semte.ch/application"
    volumes:
      - ./data/db:/data
      - ./config/virtuoso/virtuoso.ini:/data/virtuoso.ini
    restart: always
  migrations:
    logging: *default-logging
    labels:
      - "logging=true"
    image: semtech/mu-migrations-service:0.9.0
    links:
      - triplestore:database
    volumes:
      - ./config/migrations:/data/migrations
    restart: always
  resource:
    logging: *default-logging
    labels:
      - "logging=true"
    image: semtech/mu-cl-resources:1.23.0
    environment:
      CACHE_CLEAR_PATH: "http://cache/.mu/clear-keys"
    links:
      - database:database
    volumes:
      - ./config/resources:/config
    restart: always
  cache:
    image: semtech/mu-cache:2.0.2
    links:
      - resource:backend
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  deltanotifier:
    image: semtech/mu-delta-notifier
    volumes:
      - ./config/delta:/config
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  file:
    image: semtech/mu-file-service:3.3.2
    labels:
      - "logging=true"
    logging: *default-logging
    links:
      - database:database
    volumes:
      - ./data/files:/share
    restart: always
  bpmn:
    logging: *default-logging
    labels:
      - "logging=true"
    image: lblod/bpmn-service
    volumes:
      - ./data/files:/share
    restart: always
  accountdetail:
    image: lblod/account-detail-service:0.1.0
    labels:
      - "logging=true"
    links:
      - database:database
    restart: always
    logging: *default-logging
  ################################################################################
  # MU SEARCH
  ################################################################################
  search:
    image: semtech/mu-search:0.9.1
    links:
      - database:database
    restart: always
    labels:
      - "logging=true"
    logging: *default-logging
    volumes:
      - ./config/search:/config
  elasticsearch:
    labels:
      - "logging=true"
    logging: *default-logging
    image: semtech/mu-search-elastic-backend:1.0.1
    volumes:
      - ./data/elasticsearch/:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
    restart: always
  ################################################################################
  # DELTAS
  ################################################################################
  consumer-lokale-besturen:
    image: lblod/delta-consumer:latest
    environment:
      DCR_SYNC_BASE_URL: "https://organisaties.abb.vlaanderen.be"
      DCR_SERVICE_NAME: "consumer-lokale-besturen"
      DCR_SYNC_FILES_PATH: "/sync/lokale-besturen/files"
      DCR_SYNC_DATASET_SUBJECT: "http://data.lblod.info/datasets/delta-producer/dumps/WorshipPostsCacheGraphDump"
      DCR_INITIAL_SYNC_JOB_OPERATION: "http://redpencil.data.gift/id/jobs/concept/JobOperation/deltas/consumer/ophLokaleBesturen"
      DCR_DELTA_SYNC_JOB_OPERATION: "http://redpencil.data.gift/id/jobs/concept/JobOperation/deltas/consumer/ophLokaleBesturenDeltaFileSyncing"
      DCR_JOB_CREATOR_URI: "http://data.lblod.info/services/id/consumer-lokale-besturen"
      DCR_KEEP_DELTA_FILES: "true"
      DCR_DELTA_FILE_FOLDER: "/consumer-files"
      BYPASS_MU_AUTH_FOR_EXPENSIVE_QUERIES: "false"
      INGEST_GRAPH: "http://mu.semte.ch/graphs/ingest"
      BATCH_SIZE: 1000
    volumes:
      - ./config/consumers/lokale-besturen:/config/triples-dispatching/custom-dispatching
      - ./data/files/consumer-files/lokale-besturen:/consumer-files/
    links:
      - database:database
    restart: always
    logging: *default-logging
